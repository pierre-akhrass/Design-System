name: Storybook Tests

on:
  push:
    branches:
      - main
      - stephan
  pull_request:

jobs:
  storybook:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-design-system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Storybook component tests
        run: npm run test-storybook

      - name: Run Storybook coverage
        run: npm run test-storybook:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-coverage
          path: my-design-system/coverage
